name: codequest
description: Infraestrutura base do CodeQuest (Flutter + Firebase Emulators).
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  firebase_core: ^4.2.0
  firebase_auth: ^6.0.3
  cloud_firestore: ^6.0.2
  cloud_functions: ^6.0.2
  firebase_storage: ^13.0.2
  firebase_messaging: ^16.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^16.2.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.7.0
  freezed: ^3.2.3
  json_serializable: ^6.11.1
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
